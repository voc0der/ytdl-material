name: Dependencies

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 5'
  workflow_dispatch:

jobs:
  outdated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Install backend dependencies
        run: npm ci --ignore-scripts
        working-directory: ./backend

      - name: Check frontend dependencies
        id: frontend_outdated
        continue-on-error: true
        run: |
          set +e
          npm outdated --json > outdated.json
          status=$?
          set -e

          if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
            exit "$status"
          fi

          node <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('outdated.json', 'utf8').trim();
          const packages = raw ? JSON.parse(raw) : {};
          const behindWanted = Object.entries(packages)
            .filter(([, details]) => details.current !== details.wanted);

          if (behindWanted.length === 0) {
            process.exit(0);
          }

          for (const [name, details] of behindWanted) {
            console.log(`${name}: current ${details.current}, wanted ${details.wanted}, latest ${details.latest}`);
          }
          process.exit(1);
          NODE

      - name: Check backend dependencies
        id: backend_outdated
        continue-on-error: true
        run: |
          set +e
          npm outdated --json > outdated.json
          status=$?
          set -e

          if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
            exit "$status"
          fi

          node <<'NODE'
          const fs = require('fs');
          const raw = fs.readFileSync('outdated.json', 'utf8').trim();
          const packages = raw ? JSON.parse(raw) : {};
          const behindWanted = Object.entries(packages)
            .filter(([, details]) => details.current !== details.wanted);

          if (behindWanted.length === 0) {
            process.exit(0);
          }

          for (const [name, details] of behindWanted) {
            console.log(`${name}: current ${details.current}, wanted ${details.wanted}, latest ${details.latest}`);
          }
          process.exit(1);
          NODE
        working-directory: ./backend

      - name: Fail if dependencies are outdated
        if: always()
        run: |
          echo "Frontend check outcome: ${{ steps.frontend_outdated.outcome }}"
          echo "Backend check outcome: ${{ steps.backend_outdated.outcome }}"

          if [ "${{ steps.frontend_outdated.outcome }}" = "failure" ] || [ "${{ steps.backend_outdated.outcome }}" = "failure" ]; then
            echo "One or more dependency checks reported outdated packages."
            exit 1
          fi
