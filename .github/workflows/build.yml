name: continuous integration

on:
  push:
    branches: [main, feat/*]
    tags:
      - v*
  pull_request:
      branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: install dependencies
        run: |
          npm install
          cd backend
          npm install
          sudo npm install -g @angular/cli
      - name: Set hash
        id: vars
        run: echo "::set-output name=sha_short::$(git rev-parse --short HEAD)"
      - name: Get current date
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d')"
      - name: create-json
        id: create-json
        uses: jsdaniell/create-json@v1.2.3
        with:
          name: "version.json"
          json: '{"type": "autobuild", "tag": "N/A", "commit": "${{ steps.vars.outputs.sha_short }}", "date": "${{ steps.date.outputs.date }}"}'
          dir: 'backend/'
      - name: build
        run: npm run build
      - name: prepare artifact upload
        shell: pwsh
        run: |
          New-Item -Name build -ItemType Directory
          New-Item -Path build -Name ytdl-material -ItemType Directory
          Copy-Item -Path ./backend/appdata -Recurse -Destination ./build/ytdl-material
          Copy-Item -Path ./backend/audio -Recurse -Destination ./build/ytdl-material
          Copy-Item -Path ./backend/authentication -Recurse -Destination ./build/ytdl-material
          Copy-Item -Path ./backend/public -Recurse -Destination ./build/ytdl-material
          Copy-Item -Path ./backend/subscriptions -Recurse -Destination ./build/ytdl-material
          Copy-Item -Path ./backend/video -Recurse -Destination ./build/ytdl-material
          New-Item -Path ./build/ytdl-material -Name users -ItemType Directory
          Copy-Item -Path ./backend/*.js -Destination ./build/ytdl-material
          Copy-Item -Path ./backend/*.json -Destination ./build/ytdl-material
      - name: upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ytdl-material
          path: build
  release:
    runs-on: ubuntu-latest
    needs: build
    if: contains(github.ref, '/tags/v')
    permissions:
      contents: write
      actions: write
    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: read release notes from annotated tag
        id: release_notes
        shell: bash
        run: |
          tag_message="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")"
          if [ -z "$tag_message" ]; then
            echo "Annotated tag message is required for release notes." >&2
            exit 1
          fi

          notes_file="${RUNNER_TEMP}/release-notes.md"
          printf '%s\n' "$tag_message" > "$notes_file"
          echo "path=${notes_file}" >> "$GITHUB_OUTPUT"
      - name: create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "ytdl-material ${GITHUB_REF_NAME}" \
              --notes-file "${{ steps.release_notes.outputs.path }}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "ytdl-material ${GITHUB_REF_NAME}" \
              --notes-file "${{ steps.release_notes.outputs.path }}" \
              --verify-tag
          fi
      - name: download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ytdl-material
          path: ${{runner.temp}}/ytdl-material
      - name: prepare release asset
        shell: pwsh
        run: Compress-Archive -Path ${{runner.temp}}/ytdl-material -DestinationPath ytdl-material-${{ github.ref_name }}.zip
      - name: upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "./ytdl-material-${GITHUB_REF_NAME}.zip" \
            "./docker-compose.yml#docker-compose.yml" \
            --clobber
      - name: dispatch docker release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker-release.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}","inputs":{"tags":"${{ github.ref_name }}","publish_latest":"true"}}'
