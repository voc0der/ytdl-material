name: docker-release

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Docker tags'
        required: true
      publish_latest:
        description: 'Also push latest'
        required: false
        default: 'false'
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set release metadata
        id: release-meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            image_tags="${{ github.event.inputs.tags }}"
            publish_latest="${{ github.event.inputs.publish_latest }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            image_tags="${{ github.event.release.tag_name }}"
            publish_latest="true"
          else
            echo "Unknown workflow trigger: ${{ github.event_name }}! Cannot determine image tags."
            exit 1
          fi

          primary_tag="${image_tags%%,*}"
          echo "image_tags=${image_tags}" >> "$GITHUB_OUTPUT"
          echo "primary_tag=${primary_tag}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=${publish_latest}" >> "$GITHUB_OUTPUT"

      - name: Set hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: create-json
        id: create-json
        uses: jsdaniell/create-json@v1.2.3
        with:
          name: "version.json"
          json: '{"type": "docker", "tag": "${{ steps.release-meta.outputs.primary_tag }}", "commit": "${{ steps.vars.outputs.sha_short }}", "date": "${{ steps.date.outputs.date }}"}'
          dir: 'backend/'

      - name: Generate Docker image metadata
        id: docker-meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}
            ghcr.io/${{ github.repository_owner }}/${{ secrets.DOCKERHUB_REPO }}
          tags: |
            type=raw,value=${{ steps.release-meta.outputs.image_tags }}
            ${{ steps.release-meta.outputs.publish_latest == 'true' && 'type=raw,value=latest' || '' }}

      - name: setup platform emulator
        uses: docker/setup-qemu-action@v4

      - name: setup multi-arch docker build
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build & push images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          cache-from: type=gha,scope=docker-release
          cache-to: type=gha,mode=max,scope=docker-release
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
