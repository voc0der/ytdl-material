version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      # Keep breaking changes easy to review by batching only patch/minor updates.
      patch-updates:
        update-types:
          - "patch"
      minor-updates:
        update-types:
          - "minor"
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "daily"
    groups:
      # Keep breaking changes easy to review by batching only patch/minor updates.
      patch-updates:
        update-types:
          - "patch"
      minor-updates:
        update-types:
          - "minor"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      # Keep breaking changes easy to review by batching only patch/minor updates.
      patch-updates:
        update-types:
          - "patch"
      minor-updates:
        update-types:
          - "minor"
    ignore:
      - dependency-name: "@angular-devkit/build-angular"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "npm"
    directory: "/backend/"
    schedule:
      interval: "daily"
    groups:
      # Keep breaking changes easy to review by batching only patch/minor updates.
      patch-updates:
        update-types:
          - "patch"
      minor-updates:
        update-types:
          - "minor"
